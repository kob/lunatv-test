name: Build and Push BirdTV to GHCR

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]

env:
  # 设置镜像名称，格式为 ghcr.io/用户名/仓库名
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/birdtv

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # 必须有此权限才能推送 GHCR
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          # 自动标签策略：
          # 1. 推送 v1.0.0 标签时，生成 v1.0.0 和 v1.0 标签
          # 2. 推送到 main 分支时，生成 latest 标签
          # 3. 每次推送都生成 git-sha 标签
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 开启缓存，加速 pnpm install 和 next build
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # 如果构建非常慢，可以取消注释下面这行来增加构建时间（默认通常是 360 分钟）
          # timeout-minutes: 60
